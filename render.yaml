services:
  - type: web
    name: photoshoot-scheduler
    env: node
    buildCommand: >-
      cd frontend && npm install --include=dev && npm run build &&
      cd ../backend && npm install --include=dev && npx prisma generate && npm run build
    startCommand: node backend/dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: photoshoot-scheduler-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://photoshoot-scheduler.onrender.com
      - key: PORT
        value: "3000"
      - key: SMTP_HOST
        value: ""
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASS
        value: ""
      - key: SMTP_FROM
        value: ""

databases:
  - name: photoshoot-scheduler-db
    plan: free
    databaseName: photoshoot_scheduler
