services:
  - type: web
    name: photoshoot-scheduler
    env: node
    buildCommand: >-
      cd frontend && npm install --include=dev && npm run build &&
      cd ../backend && npm install --include=dev && npx prisma generate && npm run build &&
      (npx prisma migrate resolve --rolled-back 20260521000000_init 2>/dev/null || true) &&
      (echo "UPDATE \"_prisma_migrations\" SET \"rolled_back_at\" = NOW() WHERE \"migration_name\" = '20260613000001_add_shot_notes' AND \"rolled_back_at\" IS NULL AND \"finished_at\" IS NULL;" | npx prisma db execute --stdin 2>/dev/null || true) &&
      npx prisma migrate deploy
    startCommand: node backend/dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: photoshoot-scheduler-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://photoshoot-scheduler.onrender.com
      - key: PORT
        value: "3000"
      - key: SMTP_HOST
        value: ""
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASS
        value: ""
      - key: SMTP_FROM
        value: ""

databases:
  - name: photoshoot-scheduler-db
    plan: free
    databaseName: photoshoot_scheduler
